<h2>網站功能範圍</h2>
<p class="subtitle">選擇你想要的功能（可多選）</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>每日成分股異動表</h3>
      <p>顯示每支 ETF 當天新增／刪除／加減張數的明細列表。核心功能。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>歷史趨勢圖</h3>
      <p>某支成分股過去 N 天的持股張數折線圖，看加倉 / 減倉趨勢。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>ETF 搜尋 / 篩選</h3>
      <p>依 ETF 代碼、名稱、類型（股票型 / 債券型）或經理人搜尋。</p>
    </div>
  </div>
  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>異動警報通知</h3>
      <p>當某 ETF 大幅加倉 / 減倉時，發送 Email 或 LINE Notify 通知。</p>
    </div>
  </div>
</div>
